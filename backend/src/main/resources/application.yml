server:
  port: 8080

spring:
  config:
    # Load local env-style property files for developer machines.
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.local[.properties]
      - optional:classpath:application-secret.yml
  application:
    name: operations-hub
  datasource:
    # Prefer the standard Spring env var `SPRING_DATASOURCE_URL` if set.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smart_campus}
    # Allow either SPRING_DATASOURCE_USERNAME/PASSWORD or the older DB_USERNAME/DB_PASSWORD
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:smartcampus}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:smartcampus}}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            issuer-uri: https://accounts.google.com

jwt:
  secret: ${JWT_SECRET:change-me}
  access-token-validity-seconds: 900
  refresh-token-validity-seconds: 1209600

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  bootstrap-admin-email: ${BOOTSTRAP_ADMIN_EMAIL:path2intern@gmail.com}

logging:
  level:
    root: INFO
    com.smartcampus: DEBUG
