server:
  port: 8080

spring:
  application:
    name: operations-hub
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_campus
    username: ${DB_USERNAME:smartcampus}
    password: ${DB_PASSWORD:smartcampus}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            issuer-uri: https://accounts.google.com

jwt:
  secret: ${JWT_SECRET:change-me}
  access-token-validity-seconds: 900
  refresh-token-validity-seconds: 1209600

logging:
  level:
    root: INFO
    com.smartcampus: DEBUG
